<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Revisortopedia">
  <rect width="512" height="512" rx="112" fill="#0F1A17"/>
  <!-- mortise: medial pillar (tibia) + plafond + lateral pillar (fibula) -->
  <g stroke="#3FBFA6" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M150 120 V300 a106 106 0 0 0 212 0 V120"/>
  </g>
  <!-- talus dome cradled in the mortise -->
  <circle cx="256" cy="300" r="66" fill="none" stroke="#EAF2EE" stroke-width="18"/>
  <!-- cortical fracture line across the lateral pillar (Weber-style) -->
  <path d="M300 250 L372 196" stroke="#E4644B" stroke-width="20" stroke-linecap="round"/>
  <path d="M300 250 l-14 6 m86 -60 l14 -6" stroke="#E4644B" stroke-width="20" stroke-linecap="round"/>
</svg>
